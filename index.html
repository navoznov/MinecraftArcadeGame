<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Arcade Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #444;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 450;
canvas.width = W;
canvas.height = H;

const GRAVITY = 0.5;
const JUMP_FORCE = -12;
const MOVE_SPEED = 3;
const BLOCK = 32;

// GROUND_TOP — Y-координата поверхности земли (куда встают ногами)
const GROUND_TOP = H - 48;

// Sky gradients — day and night
const dayGradient = ctx.createLinearGradient(0, 0, 0, GROUND_TOP);
dayGradient.addColorStop(0, '#87CEEB');
dayGradient.addColorStop(1, '#C9E8F5');

const nightGradient = ctx.createLinearGradient(0, 0, 0, GROUND_TOP);
nightGradient.addColorStop(0, '#050518');
nightGradient.addColorStop(1, '#0D1033');

// Deterministic star positions
const STARS = [];
for (let i = 0; i < 70; i++) {
  STARS.push({
    x: (i * 293 + 47) % (W - 20) + 10,
    y: (i * 137 + 23) % (GROUND_TOP - 40) + 10,
    s: i % 5 === 0 ? 3 : 2,
  });
}

const keyInput = { left: false, right: false, jump: false };
const input    = { left: false, right: false, jump: false };

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playPew() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660, now);
  osc.frequency.exponentialRampToValueAtTime(220, now + 0.22);
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
  osc.start(now);
  osc.stop(now + 0.22);
}

function playSquish() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  osc.type = 'square';
  osc.frequency.setValueAtTime(350, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.18);
  gain.gain.setValueAtTime(0.25, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
  osc.start(now);
  osc.stop(now + 0.18);
}

function playPipeEnter() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  osc.type = 'square';
  osc.frequency.setValueAtTime(800, now);
  osc.frequency.exponentialRampToValueAtTime(100, now + 0.6);
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.setValueAtTime(0.15, now + 0.5);
  gain.gain.linearRampToValueAtTime(0, now + 0.6);
  osc.start(now);
  osc.stop(now + 0.6);
}

function playGameOver() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const notes = [
    { freq: 440, t: 0.00 },
    { freq: 330, t: 0.28 },
    { freq: 220, t: 0.56 },
  ];
  for (const { freq, t } of notes) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const at = audioCtx.currentTime + t;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, at);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.45, at + 0.22);
    gain.gain.setValueAtTime(0.18, at);
    gain.gain.exponentialRampToValueAtTime(0.001, at + 0.22);
    osc.start(at);
    osc.stop(at + 0.22);
  }
}

// [freq Hz (0=rest), duration s]  — Super Mario Bros. Ground Theme, 200 BPM
const MARIO_MELODY = [
  // Intro
  [659,.15],[0,.15],[659,.15],[0,.15],[659,.15],[0,.15],[523,.15],[659,.30],
  [784,.60],[0,.30],[392,.60],
  // Section A
  [523,.45],[392,.30],[0,.30],[330,.45],[0,.15],
  [440,.30],[0,.15],[494,.30],[0,.15],[466,.30],[440,.30],
  [392,.10],[659,.10],[784,.10],[880,.30],[698,.15],[784,.15],
  [659,.30],[523,.15],[587,.15],[494,.45],[0,.15],
  // Section A repeat
  [523,.45],[392,.30],[0,.30],[330,.45],[0,.15],
  [440,.30],[0,.15],[494,.30],[0,.15],[466,.30],[440,.30],
  [392,.10],[659,.10],[784,.10],[880,.30],[698,.15],[784,.15],
  [659,.30],[523,.15],[587,.15],[494,.45],[0,.15],
  // Section B
  [784,.15],[0,.30],[698,.15],[0,.15],[659,.15],[0,.30],
  [554,.15],[587,.15],[0,.15],[523,.15],[0,.15],
  [330,.15],[392,.15],[0,.15],[440,.15],[0,.15],[494,.15],[0,.30],
  // Section A final
  [523,.45],[392,.30],[0,.30],[330,.45],[0,.15],
  [440,.30],[0,.15],[494,.30],[0,.15],[466,.30],[440,.30],
  [392,.10],[659,.10],[784,.10],[880,.30],[698,.15],[784,.15],
  [659,.30],[523,.15],[587,.15],[494,.45],[0,.30],
];

let bgMusicActive = false;
let bgMusicTimeout = null;
let bgMusicGain = null;

function scheduleBgMusicLoop() {
  if (!bgMusicActive) return;
  bgMusicGain = audioCtx.createGain();
  bgMusicGain.connect(audioCtx.destination);
  const t0 = audioCtx.currentTime + 0.05;
  let t = t0;
  for (const [freq, dur] of MARIO_MELODY) {
    if (freq > 0) {
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.connect(g);
      g.connect(bgMusicGain);
      osc.type = 'square';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.06, t);
      g.gain.setValueAtTime(0.06, t + dur * 0.82);
      g.gain.linearRampToValueAtTime(0, t + dur);
      osc.start(t);
      osc.stop(t + dur);
    }
    t += dur;
  }
  bgMusicTimeout = setTimeout(scheduleBgMusicLoop, (t - t0) * 1000);
}

function startBgMusic() {
  if (bgMusicActive || bgMusicMuted) return;
  audioCtx.resume();
  bgMusicActive = true;
  scheduleBgMusicLoop();
}

function stopBgMusic() {
  bgMusicActive = false;
  clearTimeout(bgMusicTimeout);
  bgMusicTimeout = null;
  if (bgMusicGain) {
    bgMusicGain.gain.setValueAtTime(0, audioCtx.currentTime);
    bgMusicGain = null;
  }
}

function resetGame() {
  player.x = W / 2 - 20;
  player.y = GROUND_TOP;
  player.vy = 0;
  player.onGround = true;
  player.facingRight = true;
  player.walkFrame = 0;
  player.walkTimer = 0;
  mobs = [];
  score = 0;
  spawnTimer = 0;
  level         = 1;
  levelKills    = 0;
  pipeVisible   = false;
  levelComplete = false;
  mobSpeed      = 1.4;
  spawnInterval = 240;
  mobs = [];
  spawnTimer = 0;
  spawnMob(true, false);
  spawnMob(true, true);
  gameOver = false;
  startBgMusic();
}

document.addEventListener('keydown', e => {
  if (!bgMusicActive && !gameOver && !levelComplete) startBgMusic();
  if (levelComplete && (e.key === ' ' || e.key === 'Enter')) { nextLevel(); return; }
  if (gameOver && (e.key === ' ' || e.key === 'Enter')) { resetGame(); return; }
  if (e.key === 'ArrowLeft')  keyInput.left  = true;
  if (e.key === 'ArrowRight') keyInput.right = true;
  if (e.key === ' ')          keyInput.jump  = true;
  if (e.key === ' ')          e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  keyInput.left  = false;
  if (e.key === 'ArrowRight') keyInput.right = false;
  if (e.key === ' ')          keyInput.jump  = false;
});

// Xbox Standard Mapping:
//   axes[0]      — left stick X
//   buttons[0]   — A (прыжок)
//   buttons[14]  — D-pad Left
//   buttons[15]  — D-pad Right
function pollGamepad() {
  const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
  let gpLeft = false, gpRight = false, gpJump = false;
  for (const gp of gamepads) {
    if (!gp) continue;
    const stickX = gp.axes[0] ?? 0;
    gpLeft  = stickX < -0.3 || !!(gp.buttons[14]?.pressed);
    gpRight = stickX >  0.3 || !!(gp.buttons[15]?.pressed);
    gpJump  = !!(gp.buttons[0]?.pressed);
    if (gpLeft || gpRight || gpJump) audioCtx.resume();
    if (!bgMusicActive && !gameOver && !levelComplete && (gpLeft || gpRight || gpJump)) startBgMusic();
    if (levelComplete && gpJump) { nextLevel(); return; }
    if (gameOver && gpJump) { resetGame(); return; }
    break;
  }
  input.left  = keyInput.left  || gpLeft;
  input.right = keyInput.right || gpRight;
  input.jump  = keyInput.jump  || gpJump;
}

const player = {
  x: W / 2 - 20,
  y: GROUND_TOP,  // Y ног игрока
  vy: 0,
  onGround: false,
  facingRight: true,
  walkFrame: 0,
  walkTimer: 0,
};

// Платформы: y — верхняя поверхность (куда встают ногами)
const platforms = [
  { x: 60,  y: GROUND_TOP - 110, w: 128 },
  { x: 336, y: GROUND_TOP - 110, w: 160 },
  { x: 600, y: GROUND_TOP - 110, w: 128 },
  { x: 180, y: GROUND_TOP - 220, w: 128 },
  { x: 460, y: GROUND_TOP - 220, w: 128 },
  { x: 310, y: GROUND_TOP - 320, w: 160 },
];

// Steve pixel art: 8 wide × 18 tall, drawn at 5px per cell = 40×90
const PALETTE = [
  null,       // 0 transparent
  '#C68642',  // 1 skin
  '#513710',  // 2 dark brown hair
  '#4B8C9C',  // 3 teal shirt (Steve's iconic color)
  '#2A3A8C',  // 4 dark blue pants
  '#1A1008',  // 5 dark shoe
  '#8888AA',  // 6 Steve's gray-blue eyes
  '#2A5C6C',  // 7 shirt shadow (darker teal)
  '#1A2860',  // 8 pants shadow
  '#A06030',  // 9 skin shadow
];

// Steve sprite: 8 wide × 18 tall (5px per cell = 40×90 on canvas)
const STEVE = [
  [0,0,2,2,2,2,0,0], // row 0  hair top
  [0,2,2,2,2,2,2,0], // row 1  hair
  [2,2,2,2,2,2,2,2], // row 2  hair sides
  [2,1,1,1,1,1,1,2], // row 3  forehead
  [2,1,6,1,1,6,1,2], // row 4  eyes
  [2,1,6,1,1,6,1,2], // row 5  eyes bottom
  [2,1,1,1,1,1,1,2], // row 6  nose
  [2,1,9,2,2,9,1,2], // row 7  mouth/chin
  [0,3,3,3,3,3,3,0], // row 8  shoulders
  [3,3,3,3,3,3,3,3], // row 9  chest top
  [3,3,7,3,3,7,3,3], // row 10 chest
  [3,3,3,3,3,3,3,3], // row 11 chest lower
  [3,7,3,3,3,3,7,3], // row 12 waist
  [4,4,4,0,0,4,4,4], // row 13 hips
  [4,4,4,0,0,4,4,4], // row 14 upper legs
  [4,8,4,0,0,4,8,4], // row 15 mid legs
  [4,4,4,0,0,4,4,4], // row 16 lower legs
  [5,5,5,0,0,5,5,5], // row 17 shoes
];

// Zombie palette — зелёная кожа, светящиеся глаза, бурая рваная рубаха
const ZOMBIE_PALETTE = [
  null,       // 0 transparent
  '#5A9A48',  // 1 zombie green skin
  '#2A5A18',  // 2 dark green (hair / head)
  '#7A5A3A',  // 3 brown tattered shirt
  '#3A3040',  // 4 dark gray pants
  '#1A1010',  // 5 dark shoe
  '#FFFF80',  // 6 glowing yellow eyes
  '#4A3020',  // 7 shirt shadow
  '#1A1820',  // 8 pants shadow
  '#2A6028',  // 9 dark mouth
];

const ZOMBIE = [
  [0,0,2,2,2,2,0,0], // row 0  голова (тёмная макушка)
  [0,2,2,2,2,2,2,0], // row 1
  [2,2,1,1,1,1,2,2], // row 2  лоб
  [2,1,1,1,1,1,1,2], // row 3
  [2,1,6,1,1,6,1,2], // row 4  светящиеся глаза
  [2,1,6,1,1,6,1,2], // row 5
  [2,1,1,1,1,1,1,2], // row 6  нос
  [2,2,9,9,9,9,2,2], // row 7  открытый рот (зомби оскал)
  [0,3,3,3,3,3,3,0], // row 8  плечи
  [3,3,3,3,3,3,3,3], // row 9  грудь
  [3,3,7,3,3,7,3,3], // row 10
  [3,3,3,3,3,3,3,3], // row 11
  [3,7,3,3,3,3,7,3], // row 12 пояс
  [4,4,4,0,0,4,4,4], // row 13 бёдра
  [4,4,4,0,0,4,4,4], // row 14 ноги верх
  [4,8,4,0,0,4,8,4], // row 15 ноги
  [4,4,4,0,0,4,4,4], // row 16 ноги низ
  [5,5,5,0,0,5,5,5], // row 17 ботинки
];

const CELL = 5; // px per sprite cell
const SW = 8 * CELL;  // sprite width  = 40
const SH = 18 * CELL; // sprite height = 90

// ── Моб-система ────────────────────────────────────────────
let mobSpeed      = 1.4;
let spawnInterval = 240;
let score = 0;
let mobs = [];
let spawnTimer = 0;
let gameOver    = false;
let levelComplete = false;
let level       = 1;
let levelKills  = 0;
let pipeVisible = false;

const PIPE_X         = 700; // x левого края тела трубы
const PIPE_W         = 44;  // ширина тела
const PIPE_H         = 60;  // высота от земли
const PIPE_CAP_EXTRA = 4;   // выступ крышки с каждой стороны

let bgMusicMuted = false;
const MUTE_BTN = { x: W - 56, y: 8, w: 48, h: 32 };

canvas.addEventListener('click', e => {
  const r  = canvas.getBoundingClientRect();
  const cx = (e.clientX - r.left) * (W / r.width);
  const cy = (e.clientY - r.top)  * (H / r.height);
  if (cx >= MUTE_BTN.x && cx <= MUTE_BTN.x + MUTE_BTN.w &&
      cy >= MUTE_BTN.y && cy <= MUTE_BTN.y + MUTE_BTN.h) {
    bgMusicMuted = !bgMusicMuted;
    if (bgMusicMuted) {
      stopBgMusic();
    } else if (!gameOver && !levelComplete) {
      startBgMusic();
    }
  }
});

function spawnMob(startOnScreen = false, fromRight = null) {
  if (fromRight === null) fromRight = Math.random() > 0.5;
  const x = startOnScreen
    ? (fromRight ? W - SW - 20 : 20)
    : (fromRight ? W + 10 : -SW - 10);
  mobs.push({
    x,
    y: GROUND_TOP,
    vx: fromRight ? -mobSpeed : mobSpeed,
    alive: true,
    walkFrame: 0,
    walkTimer: 0,
    dyingTimer: 0,
  });
}

// Начальные мобы — по одному с каждой стороны экрана
spawnMob(true, false);
spawnMob(true, true);

function updateMobs() {
  // Спавн новых мобов
  spawnTimer++;
  const aliveMobs = mobs.filter(m => m.alive).length;
  if (spawnTimer >= spawnInterval && aliveMobs < 5 && !pipeVisible) {
    spawnTimer = 0;
    spawnMob();
  }

  // Убрать мёртвых, у которых закончилась анимация смерти
  mobs = mobs.filter(m => m.alive || m.dyingTimer > 0);

  const prevPlayerY = player.y - player.vy; // Y ног до этого кадра

  for (const mob of mobs) {
    if (!mob.alive) {
      mob.dyingTimer--;
      continue;
    }

    mob.x += mob.vx;

    mob.walkTimer++;
    if (mob.walkTimer > 14) {
      mob.walkTimer = 0;
      mob.walkFrame = 1 - mob.walkFrame;
    }

    // Моб ушёл за экран — просто удаляем
    if (mob.x < -SW - 60 || mob.x > W + 60) {
      mob.alive = false;
      mob.dyingTimer = 0;
      continue;
    }

    const mobTop  = mob.y - SH;
    const mobLeft = mob.x + 4;
    const mobRight= mob.x + SW - 4;
    const plLeft  = player.x + 4;
    const plRight = player.x + SW - 4;

    const overlapX = plRight > mobLeft && plLeft < mobRight;
    if (!overlapX) continue;

    const overlapY = player.y > mobTop && player.y - SH < mob.y;

    if (!overlapY) continue;

    // Игрок падает сверху на голову
    if (player.vy > 0 && prevPlayerY <= mobTop + 10) {
      mob.alive = false;
      mob.dyingTimer = 20;
      player.vy = JUMP_FORCE * 0.55; // отпрыгнуть вверх
      score++;
      levelKills++;
      if (levelKills >= 5) pipeVisible = true;
      playSquish();
    } else {
      // Боковое касание — смерть
      gameOver = true;
      stopBgMusic();
      playGameOver();
    }
  }
}

// ── Рисование ───────────────────────────────────────────────

function drawSprite(palette, sprite, x, y, facingRight, legOffset) {
  for (let row = 0; row < 18; row++) {
    for (let col = 0; col < 8; col++) {
      const color = palette[sprite[row][col]];
      if (!color) continue;

      let drawCol = col;
      if (row >= 13) {
        if (col < 4) drawCol = col + (legOffset > 0 ? Math.round(legOffset * (row - 12) / 6) : 0);
        else         drawCol = col + (legOffset < 0 ? Math.round(legOffset * (row - 12) / 6) : 0);
      }

      // flip для зеркала
      const finalCol = facingRight ? drawCol : (7 - drawCol);
      ctx.fillStyle = color;
      ctx.fillRect(x + finalCol * CELL, y + row * CELL, CELL, CELL);
    }
  }
}

function drawSteve(x, y, facingRight, walking, frame) {
  const legOffset = walking ? (frame === 0 ? 3 : -3) : 0;
  drawSprite(PALETTE, STEVE, x, y, facingRight, legOffset);
}

function drawZombie(x, y, facingRight, walking, frame, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const legOffset = walking ? (frame === 0 ? 3 : -3) : 0;
  drawSprite(ZOMBIE_PALETTE, ZOMBIE, x, y, facingRight, legOffset);
  ctx.restore();
}

function drawMobs() {
  for (const mob of mobs) {
    const alpha = mob.alive ? 1 : mob.dyingTimer / 20;
    // При смерти — немного сжать (squish эффект)
    if (!mob.alive) {
      ctx.save();
      const cx = mob.x + SW / 2;
      const by = mob.y;
      ctx.translate(cx, by);
      const s = mob.dyingTimer / 20;
      ctx.scale(1 + (1 - s) * 0.5, s);
      ctx.translate(-cx, -by);
    }
    drawZombie(mob.x, mob.y - SH, mob.vx > 0, mob.alive, mob.walkFrame, alpha);
    if (!mob.alive) ctx.restore();
  }
}

function drawGround() {
  ctx.fillStyle = '#5A8A3C';
  ctx.fillRect(0, GROUND_TOP, W, 12);
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(0, GROUND_TOP + 12, W, H - GROUND_TOP - 12);
  ctx.fillStyle = '#4A7A2C';
  for (let bx = 0; bx < W; bx += BLOCK) {
    ctx.fillRect(bx, GROUND_TOP, BLOCK - 1, 5);
  }
}

function drawPlatform(p) {
  const PH = 24;
  ctx.fillStyle = '#5A8A3C';
  ctx.fillRect(p.x, p.y, p.w, 10);
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(p.x, p.y + 10, p.w, PH - 10);
  ctx.fillStyle = '#4A7A2C';
  for (let bx = p.x; bx < p.x + p.w; bx += BLOCK) {
    ctx.fillRect(bx, p.y, Math.min(BLOCK - 1, p.x + p.w - bx), 4);
  }
  ctx.fillStyle = '#3A4A2080';
  ctx.fillRect(p.x + 4, p.y + PH, p.w - 4, 4);
}

function isNight() {
  return level % 2 === 0;
}

function drawBackground() {
  const night = isNight();
  ctx.fillStyle = night ? nightGradient : dayGradient;
  ctx.fillRect(0, 0, W, GROUND_TOP);

  if (night) {
    // Stars
    ctx.fillStyle = '#FFFFFF';
    for (const s of STARS) ctx.fillRect(s.x, s.y, s.s, s.s);

    // Moon
    ctx.fillStyle = '#E8E8D0';
    ctx.fillRect(8, 48, 40, 40);
    ctx.fillStyle = '#D0D0A8';
    ctx.fillRect(2,  62, 6, 6);
    ctx.fillRect(50, 62, 6, 6);
    ctx.fillRect(22, 42, 6, 6);
    ctx.fillRect(22, 88, 6, 6);
    // Moon craters
    ctx.fillStyle = '#C0C098';
    ctx.fillRect(16, 56, 8, 8);
    ctx.fillRect(28, 68, 6, 6);
  } else {
    // Sun (below HUD label on the left)
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(8, 48, 40, 40);
    ctx.fillStyle = '#FFF176';
    ctx.fillRect(2,  62, 6, 6);  // left ray
    ctx.fillRect(50, 62, 6, 6);  // right ray
    ctx.fillRect(22, 42, 6, 6);  // top ray
    ctx.fillRect(22, 88, 6, 6);  // bottom ray

    // Clouds (blocky)
    drawCloud(100, 60);
    drawCloud(350, 40);
    drawCloud(580, 70);
  }
}

function drawCloud(cx, cy) {
  ctx.fillStyle = '#FFFFFFCC';
  ctx.fillRect(cx,      cy + 8,  48, 16);
  ctx.fillRect(cx + 8,  cy,      32, 16);
  ctx.fillRect(cx + 16, cy - 8,  16, 16);
}

function drawHUD() {
  // Score / level
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(8, 8, 210, 32);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(`Score: ${score}   Lv.${level}`, 18, 30);

  // Mute button
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(MUTE_BTN.x, MUTE_BTN.y, MUTE_BTN.w, MUTE_BTN.h);
  ctx.fillStyle = bgMusicMuted ? '#FF6666' : '#FFD700';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(bgMusicMuted ? '✕♪' : '♪', MUTE_BTN.x + MUTE_BTN.w / 2, MUTE_BTN.y + 22);
  ctx.textAlign = 'left';
}

function update() {
  pollGamepad();

  if (!levelComplete) {
    const moving = input.left || input.right;

    if (input.left) {
      player.x -= MOVE_SPEED;
      player.facingRight = false;
    }
    if (input.right) {
      player.x += MOVE_SPEED;
      player.facingRight = true;
    }

    // Walk animation
    if (moving) {
      player.walkTimer++;
      if (player.walkTimer > 12) {
        player.walkTimer = 0;
        player.walkFrame = 1 - player.walkFrame;
      }
    } else {
      player.walkFrame = 0;
      player.walkTimer = 0;
    }

    // Jump
    if (input.jump && player.onGround) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
      playPew();
    }

    // Gravity
    player.vy += GRAVITY;
    const prevY = player.y;
    player.y += player.vy;

    player.onGround = false;

    // Коллизия с землёй
    if (player.y >= GROUND_TOP) {
      player.y = GROUND_TOP;
      player.vy = 0;
      player.onGround = true;
    }

    // Коллизия с платформами (только приземление сверху)
    if (player.vy >= 0) {
      for (const p of platforms) {
        if (prevY <= p.y && player.y >= p.y &&
            player.x + SW > p.x + 4 && player.x < p.x + p.w - 4) {
          player.y = p.y;
          player.vy = 0;
          player.onGround = true;
          break;
        }
      }
    }

    // World bounds
    player.x = Math.max(0, Math.min(W - SW, player.x));

    // Коллизия с трубой — вход в следующий уровень
    if (pipeVisible) {
      const capLeft  = PIPE_X - PIPE_CAP_EXTRA;
      const capRight = PIPE_X + PIPE_W + PIPE_CAP_EXTRA;
      if (player.x + SW - 4 > capLeft && player.x + 4 < capRight) {
        levelComplete = true;
        stopBgMusic();
        playPipeEnter();
      }
    }
  }

  updateMobs();
}

function drawPipe(x, y) {
  const capX = x - PIPE_CAP_EXTRA;
  const capW = PIPE_W + PIPE_CAP_EXTRA * 2;
  const capH = 14;
  // тень
  ctx.fillStyle = '#1A5C17';
  ctx.fillRect(x + 4,   y - PIPE_H + 4, PIPE_W, PIPE_H);
  ctx.fillRect(capX + 4, y - PIPE_H + 4, capW,   capH);
  // тело
  ctx.fillStyle = '#2EA829';
  ctx.fillRect(x,   y - PIPE_H, PIPE_W, PIPE_H);
  // крышка
  ctx.fillStyle = '#38C032';
  ctx.fillRect(capX, y - PIPE_H, capW, capH);
  // блик на теле
  ctx.fillStyle = '#50D84A';
  ctx.fillRect(x + 6, y - PIPE_H + capH, 8, PIPE_H - capH - 4);
  // блик на крышке
  ctx.fillRect(capX + 6, y - PIPE_H + 2, 12, capH - 4);
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 52px monospace';
  ctx.fillText('LEVEL COMPLETE!', W / 2, H / 2 - 24);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(`Score: ${score}   Level: ${level}`, W / 2, H / 2 + 20);
  ctx.fillStyle = '#AAFFAA';
  ctx.font = '18px monospace';
  ctx.fillText('Space / Enter / A — next level', W / 2, H / 2 + 56);
  ctx.textAlign = 'left';
}

function nextLevel() {
  level++;
  levelKills    = 0;
  pipeVisible   = false;
  levelComplete = false;
  mobSpeed      = Math.min(mobSpeed * 1.15, 4.0);
  spawnInterval = Math.max(Math.floor(spawnInterval * 0.85), 80);
  player.x = W / 2 - 20;
  player.y = GROUND_TOP;
  player.vy = 0;
  player.onGround = true;
  player.facingRight = true;
  player.walkFrame = 0;
  player.walkTimer = 0;
  mobs = [];
  spawnTimer = 0;
  spawnMob(true, false);
  spawnMob(true, true);
  startBgMusic();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF3333';
  ctx.font = 'bold 60px monospace';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 24);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 24px monospace';
  ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 20);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '18px monospace';
  ctx.fillText('Space / Enter / A — restart', W / 2, H / 2 + 56);
  ctx.textAlign = 'left';
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  platforms.forEach(drawPlatform);
  drawGround();
  if (pipeVisible) drawPipe(PIPE_X, GROUND_TOP);
  drawMobs();
  drawSteve(player.x, player.y - SH, player.facingRight, input.left || input.right, player.walkFrame);
  drawHUD();
  if (levelComplete) drawLevelComplete();
  if (gameOver)      drawGameOver();
}

function loop() {
  if (!gameOver) update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
