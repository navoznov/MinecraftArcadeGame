<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Arcade Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #444;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 450;
canvas.width = W;
canvas.height = H;

const GRAVITY = 0.5;
const JUMP_FORCE = -12;
const MOVE_SPEED = 3;
const BLOCK = 32;

// GROUND_TOP — Y-координата поверхности земли (куда встают ногами)
const GROUND_TOP = H - 48;

// Sky gradient
const skyGradient = ctx.createLinearGradient(0, 0, 0, GROUND_TOP);
skyGradient.addColorStop(0, '#87CEEB');
skyGradient.addColorStop(1, '#C9E8F5');

const input = { left: false, right: false, jump: false };

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playPew() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660, now);
  osc.frequency.exponentialRampToValueAtTime(220, now + 0.22);
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
  osc.start(now);
  osc.stop(now + 0.22);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  input.left  = true;
  if (e.key === 'ArrowRight') input.right = true;
  if (e.key === ' ')          input.jump  = true;
  if (e.key === ' ')          e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  input.left  = false;
  if (e.key === 'ArrowRight') input.right = false;
  if (e.key === ' ')          input.jump  = false;
});

const player = {
  x: W / 2 - 20,
  y: GROUND_TOP,  // Y ног игрока
  vy: 0,
  onGround: false,
  facingRight: true,
  walkFrame: 0,
  walkTimer: 0,
};

// Платформы: y — верхняя поверхность (куда встают ногами)
const platforms = [
  { x: 60,  y: GROUND_TOP - 110, w: 128 },
  { x: 336, y: GROUND_TOP - 110, w: 160 },
  { x: 600, y: GROUND_TOP - 110, w: 128 },
  { x: 180, y: GROUND_TOP - 220, w: 128 },
  { x: 460, y: GROUND_TOP - 220, w: 128 },
  { x: 310, y: GROUND_TOP - 320, w: 160 },
];

// Steve pixel art: 8 wide × 18 tall, drawn at 5px per cell = 40×90
const PALETTE = [
  null,       // 0 transparent
  '#C68642',  // 1 skin
  '#513710',  // 2 dark brown hair
  '#4B8C9C',  // 3 teal shirt (Steve's iconic color)
  '#2A3A8C',  // 4 dark blue pants
  '#1A1008',  // 5 dark shoe
  '#8888AA',  // 6 Steve's gray-blue eyes
  '#2A5C6C',  // 7 shirt shadow (darker teal)
  '#1A2860',  // 8 pants shadow
  '#A06030',  // 9 skin shadow
];

// Steve sprite: 8 wide × 18 tall (5px per cell = 40×90 on canvas)
const STEVE = [
  [0,0,2,2,2,2,0,0], // row 0  hair top
  [0,2,2,2,2,2,2,0], // row 1  hair
  [2,2,2,2,2,2,2,2], // row 2  hair sides
  [2,1,1,1,1,1,1,2], // row 3  forehead
  [2,1,6,1,1,6,1,2], // row 4  eyes
  [2,1,6,1,1,6,1,2], // row 5  eyes bottom
  [2,1,1,1,1,1,1,2], // row 6  nose
  [2,1,9,2,2,9,1,2], // row 7  mouth/chin
  [0,3,3,3,3,3,3,0], // row 8  shoulders
  [3,3,3,3,3,3,3,3], // row 9  chest top
  [3,3,7,3,3,7,3,3], // row 10 chest
  [3,3,3,3,3,3,3,3], // row 11 chest lower
  [3,7,3,3,3,3,7,3], // row 12 waist
  [4,4,4,0,0,4,4,4], // row 13 hips
  [4,4,4,0,0,4,4,4], // row 14 upper legs
  [4,8,4,0,0,4,8,4], // row 15 mid legs
  [4,4,4,0,0,4,4,4], // row 16 lower legs
  [5,5,5,0,0,5,5,5], // row 17 shoes
];

const CELL = 5; // px per sprite cell
const SW = 8 * CELL;  // sprite width  = 40
const SH = 18 * CELL; // sprite height = 90

function drawSteve(x, y, facingRight, walking, frame) {
  ctx.save();
  // Flip horizontally when facing left
  if (!facingRight) {
    ctx.translate(x + SW, y);
    ctx.scale(-1, 1);
  } else {
    ctx.translate(x, y);
  }

  // Simple walk animation: shift leg pixels
  const legOffset = walking ? (frame === 0 ? 3 : -3) : 0;

  for (let row = 0; row < 18; row++) {
    for (let col = 0; col < 8; col++) {
      const color = PALETTE[STEVE[row][col]];
      if (!color) continue;

      let drawCol = col;
      // Apply leg swing to lower half
      if (row >= 13) {
        if (col < 4) drawCol = col + (legOffset > 0 ? Math.round(legOffset * (row - 12) / 6) : 0);
        else         drawCol = col + (legOffset < 0 ? Math.round(legOffset * (row - 12) / 6) : 0);
      }

      ctx.fillStyle = color;
      ctx.fillRect(drawCol * CELL, row * CELL, CELL, CELL);
    }
  }
  ctx.restore();
}

function drawGround() {
  ctx.fillStyle = '#5A8A3C';
  ctx.fillRect(0, GROUND_TOP, W, 12);
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(0, GROUND_TOP + 12, W, H - GROUND_TOP - 12);
  ctx.fillStyle = '#4A7A2C';
  for (let bx = 0; bx < W; bx += BLOCK) {
    ctx.fillRect(bx, GROUND_TOP, BLOCK - 1, 5);
  }
}

function drawPlatform(p) {
  const PH = 24; // визуальная высота платформы
  ctx.fillStyle = '#5A8A3C';
  ctx.fillRect(p.x, p.y, p.w, 10);
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(p.x, p.y + 10, p.w, PH - 10);
  ctx.fillStyle = '#4A7A2C';
  for (let bx = p.x; bx < p.x + p.w; bx += BLOCK) {
    ctx.fillRect(bx, p.y, Math.min(BLOCK - 1, p.x + p.w - bx), 4);
  }
  // Тень снизу
  ctx.fillStyle = '#3A4A2080';
  ctx.fillRect(p.x + 4, p.y + PH, p.w - 4, 4);
}

function drawBackground() {
  ctx.fillStyle = skyGradient;
  ctx.fillRect(0, 0, W, GROUND_TOP);

  // Sun
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(700, 30, 40, 40);
  ctx.fillStyle = '#FFF176';
  ctx.fillRect(694, 36, 6, 6);
  ctx.fillRect(750, 36, 6, 6);
  ctx.fillRect(718, 24, 6, 6);
  ctx.fillRect(718, 70, 6, 6);

  // Clouds (blocky)
  drawCloud(100, 60);
  drawCloud(350, 40);
  drawCloud(580, 70);
}

function drawCloud(cx, cy) {
  ctx.fillStyle = '#FFFFFFCC';
  ctx.fillRect(cx,      cy + 8,  48, 16);
  ctx.fillRect(cx + 8,  cy,      32, 16);
  ctx.fillRect(cx + 16, cy - 8,  16, 16);
}

function update() {
  const moving = input.left || input.right;

  if (input.left) {
    player.x -= MOVE_SPEED;
    player.facingRight = false;
  }
  if (input.right) {
    player.x += MOVE_SPEED;
    player.facingRight = true;
  }

  // Walk animation
  if (moving) {
    player.walkTimer++;
    if (player.walkTimer > 12) {
      player.walkTimer = 0;
      player.walkFrame = 1 - player.walkFrame;
    }
  } else {
    player.walkFrame = 0;
    player.walkTimer = 0;
  }

  // Jump
  if (input.jump && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    playPew();
  }

  // Gravity
  player.vy += GRAVITY;
  const prevY = player.y;
  player.y += player.vy;

  player.onGround = false;

  // Коллизия с землёй
  if (player.y >= GROUND_TOP) {
    player.y = GROUND_TOP;
    player.vy = 0;
    player.onGround = true;
  }

  // Коллизия с платформами (только приземление сверху)
  if (player.vy >= 0) {
    for (const p of platforms) {
      if (prevY <= p.y && player.y >= p.y &&
          player.x + SW > p.x + 4 && player.x < p.x + p.w - 4) {
        player.y = p.y;
        player.vy = 0;
        player.onGround = true;
        break;
      }
    }
  }

  // World bounds
  player.x = Math.max(0, Math.min(W - SW, player.x));
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  platforms.forEach(drawPlatform);
  drawGround();
  drawSteve(player.x, player.y - SH, player.facingRight, input.left || input.right, player.walkFrame);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
